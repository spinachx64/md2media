<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>md2media 主题配色预览</title>
  <style>
    :root {
      --page-bg: #f4f6f8;
      --panel-bg: #ffffff;
      --ink: #1f2933;
      --muted: #667085;
      --line: #d9e0e8;
      --accent: #2563eb;
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--page-bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 420px minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      padding: 24px;
      background: #ffffff;
      border-right: 1px solid var(--line);
    }

    .main {
      min-width: 0;
      padding: 24px;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      backdrop-filter: blur(8px);
    }

    h1.page-title {
      margin: 0 0 6px;
      font-size: 22px;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .intro {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .current-title {
      margin: 0;
      font-size: 16px;
      line-height: 1.4;
    }

    .current-desc {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar select {
      min-width: 180px;
      height: 36px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--ink);
      font-size: 14px;
    }

    .palette-list {
      display: grid;
      gap: 14px;
    }

    .palette-card {
      width: 100%;
      padding: 14px;
      text-align: left;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color 120ms ease, box-shadow 120ms ease, transform 120ms ease;
    }

    .palette-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    .palette-card.is-active {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .palette-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .palette-name {
      margin: 0;
      font-size: 15px;
      line-height: 1.35;
      color: #111827;
    }

    .palette-note {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .badge {
      flex: 0 0 auto;
      padding: 2px 7px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-size: 12px;
      line-height: 1.5;
    }

    .swatches {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    .swatch {
      min-width: 0;
    }

    .swatch-chip {
      height: 34px;
      border: 1px solid rgba(17, 24, 39, 0.14);
      border-radius: 6px;
    }

    .swatch-label {
      display: block;
      margin-top: 5px;
      color: #475467;
      font-size: 11px;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .swatch-code {
      display: block;
      margin-top: 2px;
      color: #111827;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 10px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .article-shell {
      max-width: 820px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 18px 44px rgba(15, 23, 42, 0.08);
    }

    .article-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }

    .article-wrap {
      padding: 18px 18px 30px;
    }

    #nice {
      font-size: 16px;
      color: var(--text);
      line-height: 1.80;
      letter-spacing: 0.02em;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      word-break: break-word;
    }

    #nice p {
      margin: 16px 8px;
      font-size: 16px;
      color: var(--text);
      line-height: 1.80;
    }

    #nice h1 {
      margin: 40px 8px 20px;
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      color: var(--heading);
      line-height: 1.35;
    }

    #nice h2 {
      margin: 36px 8px 20px;
      padding-left: 12px;
      font-size: 20px;
      font-weight: 700;
      color: var(--heading);
      border-left: 4px solid var(--primary);
      line-height: 1.4;
    }

    #nice h3 {
      margin: 28px 8px 16px;
      font-size: 17px;
      font-weight: 700;
      color: var(--heading);
    }

    #nice h4 {
      margin: 24px 8px 14px;
      font-size: 16px;
      font-weight: 700;
      color: var(--heading);
    }

    #nice h5 {
      margin: 22px 8px 12px;
      font-size: 15px;
      font-weight: 700;
      color: var(--heading);
    }

    #nice h6 {
      margin: 20px 8px 12px;
      font-size: 14px;
      font-weight: 700;
      color: var(--heading);
    }

    #nice blockquote {
      margin: 20px 8px;
      padding: 12px 16px;
      border-left: 4px solid var(--primary);
      background: var(--quote-bg);
      color: var(--muted-text);
      font-size: 15px;
    }

    #nice blockquote p {
      margin: 0 0 8px;
      color: var(--muted-text);
      font-size: 15px;
    }

    #nice blockquote p:last-child {
      margin-bottom: 0;
    }

    #nice ul,
    #nice ol {
      margin: 16px 8px;
      padding-left: 24px;
      color: var(--text);
    }

    #nice li {
      margin: 6px 0;
      line-height: 1.80;
    }

    #nice code {
      margin: 0 2px;
      padding: 2px 6px;
      font-size: 14px;
      color: var(--code-inline);
      background: var(--code-inline-bg);
      border-radius: 4px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }

    #nice pre {
      margin: 20px 8px;
      padding: 16px;
      overflow-x: auto;
      background: var(--code-bg);
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.6;
    }

    #nice pre code {
      display: block;
      margin: 0;
      padding: 0;
      color: var(--code-text);
      background: transparent;
      border-radius: 0;
      font-size: 13px;
      white-space: pre;
    }

    #nice table {
      margin: 20px auto;
      border-collapse: collapse;
      font-size: 14px;
      width: auto;
      max-width: 100%;
    }

    #nice th,
    #nice td {
      padding: 8px 14px;
      border: 1px solid var(--border);
      color: var(--text);
    }

    #nice th {
      background: var(--table-head);
      font-weight: 700;
      color: var(--heading);
    }

    #nice a {
      color: var(--link);
      text-decoration: none;
      border-bottom: 1px solid var(--link);
    }

    #nice strong {
      color: var(--heading);
      font-weight: 700;
    }

    #nice em {
      color: var(--text);
    }

    #nice del {
      color: var(--muted-text);
    }

    #nice hr {
      margin: 32px 8px;
      border: none;
      border-top: 1px solid var(--border);
    }

    #nice img {
      max-width: 100%;
      border-radius: 6px;
      display: block;
      margin: 20px auto;
      border: 1px solid var(--border);
    }

    @media (max-width: 980px) {
      .app {
        display: block;
      }

      .sidebar {
        position: static;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--line);
      }

      .main {
        padding: 16px;
      }
    }

    @media (max-width: 560px) {
      .sidebar {
        padding: 16px;
      }

      .toolbar,
      .article-meta {
        display: block;
      }

      .toolbar select {
        width: 100%;
        margin-top: 12px;
      }

      .swatches {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .article-wrap {
        padding: 10px 8px 24px;
      }
    }
  </style>
</head>

  <div class="app">
    <aside class="sidebar">
      <h1 class="page-title">md2media 主题配色预览</h1>
      <p class="intro">左侧是成组色卡，右侧用 <code>syntax-test.md</code> 渲染文章效果。点击任意方案可以切换预览。</p>
      <div id="paletteList" class="palette-list"></div>

    <main class="main">
      <div class="toolbar">
        <div>
          <p id="currentTitle" class="current-title"></p>
          <p id="currentDesc" class="current-desc"></p>
        </div>
        <select id="themeSelect" aria-label="选择主题"></select>
      </div>

      <section class="article-shell">
        <div class="article-meta">
          <span>文章样例：syntax-test.md</span>
          <span id="currentThemeName"></span>
        </div>
        <div class="article-wrap">
          <article id="nice"></article>
        </div>
      </section>
    </main>
  </div>

## 代码块（python）

```python
def fibonacci(n):
    """计算斐波那契数列"""
    a, b = 0, 1
    for _ in range(n):
        a, b = b, a + b
    return a

print(fibonacci(10))  # 输出 55
```

      ["border", "边框"],
      ["codeBg", "代码块"]
    ];

    const escapeHtml = (value) => value
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;");

    function inlineFormat(text) {
      let html = escapeHtml(text);
      html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
      html = html.replace(/\[([^\]]+)\]\((\S+?)(?:\s+&quot;.*?&quot;)?\)/g, '<a href="$2">$1</a>');
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      html = html.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
      html = html.replace(/~~([^~]+)~~/g, '<del>$1</del>');
      return html;
    }

    function isTableStart(lines, index) {
      return lines[index] && lines[index].includes("|") && lines[index + 1] && /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(lines[index + 1]);
    }

    function parseTable(lines, start) {
      const header = lines[start].trim().replace(/^\||\|$/g, "").split("|").map((cell) => cell.trim());
      const rows = [];
      let index = start + 2;
      while (index < lines.length && lines[index].includes("|") && lines[index].trim()) {
        rows.push(lines[index].trim().replace(/^\||\|$/g, "").split("|").map((cell) => cell.trim()));
        index += 1;
      }
      const headHtml = header.map((cell) => `<th>${inlineFormat(cell)}</th>`).join("");
      const bodyHtml = rows.map((row) => `<tr>${row.map((cell) => `<td>${inlineFormat(cell)}</td>`).join("")}</tr>`).join("");
      return {
        html: `<table><thead><tr>${headHtml}</tr></thead><tbody>${bodyHtml}</tbody></table>`,
        next: index
      };
    }

    function parseList(lines, start, ordered) {
      let index = start;
      const tag = ordered ? "ol" : "ul";
      const itemPattern = ordered ? /^\s*\d+\.\s+(.*)$/ : /^\s*-\s+(.*)$/;
      const items = [];
      while (index < lines.length) {
        const match = lines[index].match(itemPattern);
        if (!match) break;
        let content = match[1].replace(/^\[(x| )\]\s+/i, (full, done) => done.toLowerCase() === "x" ? "☑ " : "☐ ");
        items.push(`<li>${inlineFormat(content)}</li>`);
        index += 1;
      }
      return {
        html: `<${tag}>${items.join("")}</${tag}>`,
        next: index
      };
    }

    function parseMarkdown(markdown) {
      const lines = markdown.split(/\r?\n/);
      const html = [];
      let index = 0;

      while (index < lines.length) {
        const line = lines[index];

        if (!line.trim()) {
          index += 1;
          continue;
        }

        const fence = line.match(/^```(\w+)?/);
        if (fence) {
          const codeLines = [];
          index += 1;
          while (index < lines.length && !/^```/.test(lines[index])) {
            codeLines.push(lines[index]);
            index += 1;
          }
          index += 1;
          html.push(`<pre><code>${escapeHtml(codeLines.join("\n"))}</code></pre>`);
          continue;
        }

        if (isTableStart(lines, index)) {
          const table = parseTable(lines, index);
          html.push(table.html);
          index = table.next;
          continue;
        }

        if (/^---\s*$/.test(line)) {
          html.push("<hr>");
          index += 1;
          continue;
        }

        const heading = line.match(/^(#{1,6})\s+(.+)$/);
        if (heading) {
          const level = heading[1].length;
          html.push(`<h${level}>${inlineFormat(heading[2])}</h${level}>`);
          index += 1;
          continue;
        }

        if (/^\s*-\s+/.test(line)) {
          const list = parseList(lines, index, false);
          html.push(list.html);
          index = list.next;
          continue;
        }

        if (/^\s*\d+\.\s+/.test(line)) {
          const list = parseList(lines, index, true);
          html.push(list.html);
          index = list.next;
          continue;
        }

        if (/^>/.test(line)) {
          const quoteLines = [];
          while (index < lines.length && /^>/.test(lines[index])) {
            quoteLines.push(lines[index].replace(/^>+\s?/, ""));
            index += 1;
          }
          const quoteHtml = quoteLines.join("\n").split(/\n\s*\n/).map((part) => {
            const linesHtml = part.split("\n").map((item) => inlineFormat(item)).join("<br>");
            return `<p>${linesHtml}</p>`;
          }).join("");
          html.push(`<blockquote>${quoteHtml}</blockquote>`);
          continue;
        }

        const paragraph = [line.trim()];
        index += 1;
        while (index < lines.length && lines[index].trim() && !/^(#{1,6})\s+/.test(lines[index]) && !/^```/.test(lines[index]) && !/^>/.test(lines[index]) && !/^\s*(-|\d+\.)\s+/.test(lines[index]) && !/^---\s*$/.test(lines[index]) && !isTableStart(lines, index)) {
          paragraph.push(lines[index].trim());
          index += 1;
        }
        html.push(`<p>${inlineFormat(paragraph.join(" "))}</p>`);
      }

      return html.join("\n");
    }

    function applyTheme(palette) {
      const root = document.documentElement;
      const map = {
        "--text": palette.colors.text,
        "--heading": palette.colors.heading,
        "--primary": palette.colors.primary,
        "--link": palette.colors.primary,
        "--quote-bg": palette.colors.quoteBg,
        "--code-inline": palette.colors.inlineCode,
        "--code-inline-bg": palette.colors.inlineCodeBg,
        "--table-head": palette.colors.tableHead,
        "--border": palette.colors.border,
        "--code-bg": palette.colors.codeBg,
        "--code-text": palette.colors.codeText,
        "--muted-text": palette.colors.mutedText
      };
      Object.entries(map).forEach(([key, value]) => root.style.setProperty(key, value));
      document.querySelectorAll(".palette-card").forEach((card) => card.classList.toggle("is-active", card.dataset.id === palette.id));
      document.getElementById("themeSelect").value = palette.id;
      document.getElementById("currentTitle").textContent = `${palette.name} / ${palette.title}`;
      document.getElementById("currentDesc").textContent = palette.desc;
      document.getElementById("currentThemeName").textContent = `当前主题：${palette.title}`;
    }

    function renderPaletteCards() {
      const list = document.getElementById("paletteList");
      list.innerHTML = palettes.map((palette) => {
        const swatches = swatchLabels.map(([key, label]) => `
          <div class="swatch">
            <div class="swatch-chip" style="background:${palette.colors[key]}"></div>
            <span class="swatch-label">${label}</span>
            <span class="swatch-code">${palette.colors[key]}</span>
          </div>
        `).join("");
        return `
          <button class="palette-card" type="button" data-id="${palette.id}">
            <div class="palette-head">
              <div>
                <h2 class="palette-name">${palette.name} / ${palette.title}</h2>
                <p class="palette-note">${palette.desc}</p>
              </div>
              <span class="badge">${palette.badge}</span>
            </div>
            <div class="swatches">${swatches}</div>
          </button>
        `;
      }).join("");
      list.querySelectorAll(".palette-card").forEach((card) => {
        card.addEventListener("click", () => {
          applyTheme(palettes.find((palette) => palette.id === card.dataset.id));
        });
      });
    }

    function renderSelect() {
      const select = document.getElementById("themeSelect");
      select.innerHTML = palettes.map((palette) => `<option value="${palette.id}">${palette.name} / ${palette.title}</option>`).join("");
      select.addEventListener("change", () => {
        applyTheme(palettes.find((palette) => palette.id === select.value));
      });
    }

    document.getElementById("nice").innerHTML = parseMarkdown(document.getElementById("markdownSource").textContent.trim());
    renderPaletteCards();
    renderSelect();
    applyTheme(palettes[0]);
  </script>
</body>
</html>
